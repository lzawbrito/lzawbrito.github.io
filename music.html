<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
    console.log("test");
    const $player = $('#player')[0];
    const $florDeBelem = $("#flor-de-belem")[0];
    $florDeBelem.volume = 0.0;
    $("#tsdac").mouseleave(function () {
        console.log("stopping..."); 
        $('#player').animate({opacity : 0.0});
        $("#tsdac").animate({ width: "200px" }, 441)
        $("#flor-de-belem").animate({ volume: 0.0 }, 441, function () {
            $florDeBelem.pause();
        });
    })
    $("#tsdac").mouseover(function () {
        $florDeBelem.play();
        console.log("playing...");
        document.getElementById('player').innerHTML = 'Now playing: Flor de Belem'; 
        $('#player').animate({opacity : 1.0});
        $("#flor-de-belem").animate({ volume: 1.0 }, 441);
        $("#tsdac").animate({ width: "175px" }, 441)
    });

    const $mukilteoSpeedway = $("#mukilteo-speedway")[0];
    $mukilteoSpeedway.volume = 0.0;
