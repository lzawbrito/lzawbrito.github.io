<script>
    console.log("test");
    const $audio = $("#flor-de-belem")[0];
    $audio.volume = 0.0;
    $("#tsdac").mouseleave(function () {
        console.log("stopping...");
        $("#tsdac").animate({width : "200px"}, 441)
        $("#flor-de-belem").animate({ volume: 0.0 }, 441, function () {
            $audio.pause();
        });
    })
    $("#tsdac").mouseover(function () {
        $audio.play();
        console.log("playing...");
        $("#flor-de-belem").animate({ volume: 1.0 }, 441);
        $("#tsdac").animate({width : "175px"}, 441)
    });
</script>
