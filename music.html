<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
    var maxVolume = 0.5;
    var autoplayEnabled = false;
    const $player = $('#player');
    $player.animate({ opacity: 1.0 });
    document.getElementById('player').innerHTML = 'Click here to enable autoplay.';
    $player.click(function () {
        $player.animate({ opacity: 0.0 });
        autoplayEnabled = true;
    });

    console.log("test");
    const $florDeBelem = $("#flor-de-belem")[0];
    $florDeBelem.volume = 0.0;
    $("#tsdac").mouseleave(function () {
        console.log("stopping...");
        $("#tsdac").animate({ width: "200px" }, 441)

        if (autoplayEnabled) {
            $('#player').animate({ opacity: 0.0 });
            $("#flor-de-belem").animate({ volume: 0.0 }, 441, function () {
                $florDeBelem.pause();
            });
        }
    });
    $("#tsdac").mouseover(function () {
        $florDeBelem.play();
        console.log("playing...");
        $("#tsdac").animate({ width: "175px" }, 441)
        if (autoplayEnabled) {
            $("#flor-de-belem").animate({ volume: 1.0 }, 441);
            document.getElementById('player').innerHTML = 'Now playing: Flor de Belém';
            $('#player').animate({ opacity: maxVolume });
        }
    });

    const $mukilteoSpeedway = $("#mukilteo-speedway")[0];
    $mukilteoSpeedway.volume = 0.0;
    $("#ep-2021").mouseleave(function () {
        console.log("stopping...");
        $("#ep-2021").animate({ width: "200px" }, 441)

        if (autoplayEnabled) {
            $('#player').animate({ opacity: 0.0 });
            $("#mukilteo-speedway").animate({ volume: 0.0 }, 441, function () {
                $mukilteoSpeedway.pause();
            });
        }
    })
    $("#ep-2021").mouseover(function () {
        $mukilteoSpeedway.play();
        console.log("playing...");
        $("#ep-2021").animate({ width: "175px" }, 441)
        if (autoplayEnabled) {
            $("#mukilteo-speedway").animate({ volume: maxVolume }, 441);
            document.getElementById('player').innerHTML = 'Now playing: Mukilteo Speedway';
            $('#player').animate({ opacity: 1.0 });
        }
    });

    const $onTheWire = $("#on-the-wire")[0];
    $onTheWire.volume = 0.0;
    $("#red-mud").mouseleave(function () {
        console.log("stopping...");
        $("#red-mud").animate({ width: "200px" }, 441)
        if (autoplayEnabled) {
            $('#player').animate({ opacity: 0.0 });
            $("#on-the-wire").animate({ volume: 0.0 }, 441, function () {
                document.getElementById('on-the-wire').play();
            });
        }
    })
    $("#red-mud").mouseover(function () {
        $onTheWire.play();
        console.log("playing...");
        $("#red-mud").animate({ width: "175px" }, 441);
        if (autoplayEnabled) {
            console.log("tst");
            $("#on-the-wire").animate({ volume: maxVolume }, 441);
            document.getElementById('player').innerHTML = 'Now playing: On the Wire';
            $('#player').animate({ opacity: 1.0 });
        }
    });
